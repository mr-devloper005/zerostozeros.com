name: Repair Dev Main Promotion

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  pull-requests: write
  checks: read

concurrency:
  group: repair-dev-main-promotion-${{ github.repository }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create missing dev to main PR
        env:
          GH_TOKEN: ${{ secrets.SLOT4_AUTOMATION_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "SLOT4_AUTOMATION_TOKEN secret is required."
            exit 1
          fi

          ahead_by="$(gh api "repos/${GITHUB_REPOSITORY}/compare/main...dev" --jq '.ahead_by')"
          if [ "$ahead_by" = "0" ]; then
            echo "dev is not ahead of main. Nothing to promote."
            exit 0
          fi

          promotion_pr="$(gh pr list --base main --head dev --state open --json number --jq '.[0].number // empty')"
          if [ -z "$promotion_pr" ]; then
            promotion_url="$(gh pr create               --repo "$GITHUB_REPOSITORY"               --base main               --head dev               --title "Promote dev to main"               --body "Auto-created by Slot 4 repair workflow.")"
            promotion_pr="${promotion_url##*/}"
            echo "Promotion PR created: #$promotion_pr"
          else
            echo "Promotion PR already open: #$promotion_pr"
          fi

          gh pr merge "$promotion_pr" --auto --squash
